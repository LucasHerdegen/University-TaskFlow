<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>University TaskFlow - Light Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4">University Tasks table</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Subject</th>
                    <th>Deadline</th>
                    <th>State</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="task : ${taskList}">
                    <td th:text="${task.id}">1</td>
                    <td th:text="${task.title}">Study Java</td>
                    <td th:text="${task.subject}">Design</td>
                    <td th:text="${task.expirationDate}">2026-11-20</td>
                    <td>
                        <span th:if="${task.state.name() == 'PENDING'}" class="badge bg-warning text-dark">Pending</span>
                        <span th:if="${task.state.name() == 'COMPLETED'}" class="badge bg-success">Completed</span>
                        <span th:if="${task.state.name() == 'OVERDUE'}" class="badge bg-danger">Overdue</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
